name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore MarkdownView.slnx
      - run: dotnet build MarkdownView.slnx -c Release --no-restore
      - run: dotnet test tests/WinUI.Markdown.Tests/WinUI.Markdown.Tests.csproj -c Release --no-build
      - run: dotnet pack src/WinUI.Markdown/MarkdownView.csproj -c Release --no-build --no-restore -o artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/*
